<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Suraiya Anvery</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="nav scrolled" role="navigation" aria-label="Main navigation">
    <a href="/" class="nav-brand" aria-label="Suraiya Anvery home">
      <span class="name">Suraiya Anvery</span>
      <span class="tagline">Handcrafted Works &amp; Heirloom Quilts</span>
    </a>
  </nav>

  <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 120px 24px 80px; text-align: center;">
    <div>
      <span style="font-family: var(--font-utility); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 20px;">Message Received</span>
      <h1 style="font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; color: var(--ink); line-height: 1.25; margin-bottom: 20px;">
        Thank you — your message<br>has been <em>received</em>.
      </h1>
      <p style="font-family: var(--font-body); font-size: 1.125rem; color: var(--ink-soft); margin-bottom: 40px;">
        Suraiya will be in touch personally.
      </p>
      <a href="/" style="font-family: var(--font-utility); font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 2px;">
        ← Return to the site
      </a>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <p>&copy; 2025 Suraiya Anvery</p>
  </footer>
</body>
</html>
